{% extends "innovation/base.html" %}
{% block title %}دخول الغرفة{% endblock %}

{% block body %}
<section class="max-w-lg mx-auto px-4 py-12">
  <h1 class="text-2xl font-extrabold text-sky-950 mb-3">دخول الغرفة</h1>
  <p class="text-slate-600 mb-6">أدخل كودالاجتماع .</p>

  {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" class="bg-white p-6 rounded-2xl border border-sky-100 space-y-4">
    {% csrf_token %}
    <input name="code" class="w-full border border-sky-200 rounded-xl px-4 py-3" placeholder="مثال: A1B2C3" />
    <button class="w-full bg-sky-600 text-white px-4 py-3 rounded-xl hover:bg-sky-700">دخول</button>
  </form>
</section>
{% endblock %}
