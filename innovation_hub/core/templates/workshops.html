{% extends 'core/base.html' %}

{% block content %}

<h2 class="text-2xl font-bold text-[#0E506C] mb-6">
    ورش العمل
</h2>

<div class="bg-white p-8 rounded-2xl shadow-lg">

    <h3 class="text-lg font-semibold mb-4">بطاقة التسجيل</h3>

    <form method="post">
        {% csrf_token %}

        <input type="text" placeholder="الاسم"
               class="w-full p-3 mb-4 border rounded">

        <input type="text" placeholder="القسم"
               class="w-full p-3 mb-4 border rounded">

        <textarea placeholder="الفكرة"
                  class="w-full p-3 mb-4 border rounded"></textarea>

        <button class="bg-[#0E506C] text-white px-6 py-3 rounded hover:bg-[#608C9E]">
            إرسال
        </button>

    </form>

</div>

{% endblock %}
